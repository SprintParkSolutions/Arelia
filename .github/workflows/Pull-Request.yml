name: Salesforce Apex PMD + LWC Scan

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  scan-salesforce-code:
    name: Scan Apex and LWC
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli@latest

      - name: Install Salesforce Code Analyzer v5
        run: sf plugins install code-analyzer@latest

      - name: Install npm dependencies
        run: npm ci

      - name: Verify Code Analyzer
        run: |
          sf plugins
          sf code-analyzer --help

      - name: Run Apex PMD scan using code-analyzer.yml
        id: run-code-analyzer
        uses: forcedotcom/run-code-analyzer@v2
        with:
          run-arguments: >-
            --workspace force-app/main/default/classes
            --workspace force-app/main/default/triggers
            --workspace force-app/main/default/pages
            --workspace force-app/main/default/components
            --config-file code-analyzer.yml
            --view detail
            --output-file apex-pmd-report.csv
            --output-file apex-pmd-report.html
            --output-file apex-pmd-report.json
          results-artifact-name: apex-pmd-code-analyzer-report
          github-token: ${{ github.token }}

      - name: Run LWC ESLint scan
        if: always()
        run: |
          mkdir -p scan-results
          npx eslint "force-app/main/default/lwc/**/*.js" \
            --format json \
            --output-file scan-results/lwc-eslint-report.json \
            --no-error-on-unmatched-pattern || true

          npx eslint "force-app/main/default/lwc/**/*.js" \
            --format stylish \
            --no-error-on-unmatched-pattern > scan-results/lwc-eslint-report.txt || true

      - name: Copy Apex reports into scan-results
        if: always()
        run: |
          mkdir -p scan-results

          if [ -f apex-pmd-report.csv ]; then
            cp apex-pmd-report.csv scan-results/apex-pmd-report.csv
          fi

          if [ -f apex-pmd-report.html ]; then
            cp apex-pmd-report.html scan-results/apex-pmd-report.html
          fi

          if [ -f apex-pmd-report.json ]; then
            cp apex-pmd-report.json scan-results/apex-pmd-report.json
          fi

      - name: Upload complete scan reports as PR artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: salesforce-apex-lwc-scan-reports
          path: scan-results/
          if-no-files-found: warn

      - name: Show Code Analyzer summary
        if: always()
        run: |
          echo "Apex PMD total violations: ${{ steps.run-code-analyzer.outputs.num-violations }}"
          echo "Apex PMD Severity 1 violations: ${{ steps.run-code-analyzer.outputs.num-sev1-violations }}"
          echo "Apex PMD Severity 2 violations: ${{ steps.run-code-analyzer.outputs.num-sev2-violations }}"
          echo "Apex PMD Severity 3 violations: ${{ steps.run-code-analyzer.outputs.num-sev3-violations }}"
          echo "Apex PMD Severity 4 violations: ${{ steps.run-code-analyzer.outputs.num-sev4-violations }}"
          echo "Apex PMD Severity 5 violations: ${{ steps.run-code-analyzer.outputs.num-sev5-violations }}"

      - name: Block PR on Apex Severity 1 or 2
        if: |
          steps.run-code-analyzer.outputs.exit-code > 0 ||
          steps.run-code-analyzer.outputs.num-sev1-violations > 0 ||
          steps.run-code-analyzer.outputs.num-sev2-violations > 0
        run: |
          echo "PR blocked because Apex PMD scan found Severity 1 or Severity 2 violations."
          exit 1
