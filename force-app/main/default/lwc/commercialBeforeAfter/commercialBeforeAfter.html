<template>
  <div class="scroll-target">
  <div class="ba-root">

    <nav class="ba-tabs" role="tablist" aria-label="Commercial selections">
      <button class={restaurantTabClass} data-pair="restaurant" role="tab" aria-selected={isSelectedRestaurant} onclick={onSelectPair}>Restaurant</button>
      <button class={barTabClass} data-pair="bar" role="tab" aria-selected={isSelectedBar} onclick={onSelectPair}>Bar / Lounge</button>
      <button class={banquetTabClass} data-pair="banquet" role="tab" aria-selected={isSelectedBanquet} onclick={onSelectPair}>Banquet</button>
      <button class={lobbyTabClass} data-pair="lobby" role="tab" aria-selected={isSelectedLobby} onclick={onSelectPair}>Lobby / Reception</button>
    </nav>

    <figure role="group" aria-label="Before and After comparison">
      <div class="ba-stage"
        tabindex="0"
        onkeydown={handleKeyDown}
        data-id="stage">

        <img src={computedBefore} alt={beforeAlt} class="ba-img ba-base" />

        <div class="ba-overlay-wrap" style={afterWrapStyle} data-id="afterWrap">
           <img src={computedAfter} alt={afterAlt} class="ba-img ba-overlay" />
        </div>

        <div class="ba-handle"
            role="slider"
            tabindex="0"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow={position}
            aria-label="Before and After slider"
            style={handleStyle}
            onmousedown={startDrag}
            ontouchstart={startDrag}
            data-id="handle">
          <div class="ba-handle-inner">
            <span class="arrow left-arrow">&#10094;</span>
            <span class="bar"></span>
            <span class="arrow right-arrow">&#10095;</span>
          </div>
        </div>

        <div class={afterLabelClass}>AFTER</div>
        <div class={beforeLabelClass}>BEFORE</div>
      </div>

      <figcaption class="ba-caption">Drag the handle to compare renovation results</figcaption>
    </figure>

    <div style="display:none;" aria-hidden="true">
        <template for:each={preloadUrls} for:item="url">
            <img key={url} src={url} alt="preload" />
        </template>
    </div>
    </div>
  </div>
</template>
