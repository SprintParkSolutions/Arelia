<template>
    <section class="app-shell">
        <div class="form-wrap">
            <header class="page-header">
                <h1 class="page-title">Customer Enquiry Form</h1>
                <p class="page-subtitle">
                    Share your details, verify your email and complete registration in one simple step.
                </p>
                <div class="animated-bar"></div>
            </header>

            <div class="form-card">
                <div class="slds-grid slds-wrap slds-gutters main-row">
                    <!-- Customer Details -->
                    <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2 section-block">
                        <h2 class="section-title">Customer Details</h2>
                        <p class="section-help">
                            We’ll create your profile with these details and use them for future communication.
                        </p>

                        <div class="slds-grid slds-wrap slds-gutters_small">
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-input label="First Name" name="firstName" value={firstName}
                                    onchange={handleInputChange} required>
                                </lightning-input>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-input label="Last Name" name="lastName" value={lastName}
                                    onchange={handleInputChange} required>
                                </lightning-input>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-input label="Email" name="email" data-id="emailInput" type="email"
                                    value={email} onchange={handleInputChange} required>
                                </lightning-input>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-input label="Company Name (Optional)" name="companyName" value={companyName}
                                    onchange={handleInputChange}>
                                </lightning-input>
                                <div class="field-help">If not provided, we'll use <b>Self</b>.</div>
                            </div>


                            <div class="slds-col slds-size_1-of-1">
                                <div class="phone-row">
                                    <lightning-combobox name="countryCode" label="Country Code" class="country-code"
                                        value={countryCode} options={countryCodeOptions} onchange={handleCountryChange}>
                                    </lightning-combobox>

                                    <lightning-input label="Mobile Number" name="phone" data-id="phoneInput" type="tel"
                                        class="mobile-input" value={phone} onchange={handleInputChange} required>
                                    </lightning-input>
                                </div>
                                <div class="field-help">
                                    Enter a 10-digit mobile number (example: 9876543210).
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Email Verification -->
                    <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2 section-block">
                        <h2 class="section-title">Email Verification</h2>
                        <p class="section-help">
                            Click <strong>Send Code</strong> to receive a 6-digit code. Enter it and click
                            <strong>Verify Code</strong>. After verification, you can register.
                        </p>


                        <div class="summary-block">
                            <div class="summary-label">Email to verify</div>
                            <div class="summary-value">
                                <template if:true={email}>{email}</template>
                                <template if:false={email}>Enter your email on the left.</template>
                            </div>
                        </div>

                        <div class="slds-grid slds-wrap slds-gutters_small verification-row">
                            <div class="slds-col slds-size_1-of-1">
                                <lightning-input label="Verification Code" name="otpInput" value={otpInput}
                                    onchange={handleOtpChange} maxlength="6" pattern="[0-9]*">
                                </lightning-input>
                            </div>

                            <div class="slds-col slds-size_1-of-1">
                                <div class="verification-buttons">
                                    <lightning-button label={sendCodeButtonLabel} variant="brand"
                                        onclick={handleSendCode} disabled={isSendCodeDisabled}>
                                    </lightning-button>

                                    <lightning-button label="Verify Code" variant="brand" onclick={handleVerifyCode}
                                        disabled={disableVerifyButton}>
                                    </lightning-button>
                                </div>
                            </div>

                            <template if:true={emailVerified}>
                                <div class="slds-col slds-size_1-of-1 slds-m-top_small">
                                    <span class="verified-label">✔ Email verified</span>
                                </div>
                            </template>
                        </div>

                        <div class="verification-info">
                            <template if:true={resendTimerActive}>
                                <span>Resend available in {resendTimer} seconds.</span>
                            </template>
                            <template if:false={resendTimerActive}>
                                <span>Didn’t receive the code? Click <b>Resend Code</b>.</span>
                            </template>

                        </div>
                    </div>
                </div>

                <div class="form-footer">
                    <lightning-button label="Register" variant="brand" onclick={handleSubmit}
                        disabled={isRegisterDisabled}>
                    </lightning-button>
                </div>
            </div>
        </div>

        <!-- Success overlay -->
        <template if:true={showSuccessScreen}>
            <div class="success-screen">
                <div class="success-box">
                    <h2 class="success-title">Registration Successful</h2>
                    <p class="success-message">
                        Thank you for registering. We’ve created your profile and sent a confirmation email
                        with your details.
                    </p>
                    <p class="success-secondary">
                        Our team will review your information and contact you soon with next steps for your
                        interior project.
                    </p>
                    <lightning-button label="Close" variant="brand" onclick={handleCloseSuccess}>
                    </lightning-button>
                </div>
            </div>
        </template>
    </section>
</template>
