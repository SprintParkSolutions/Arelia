<template>
    <template if:true={isVisible}>
        <lightning-card title="Lead Progress Path" icon-name="standard:lead">
            <template if:true={isReady}>
                <template if:true={hasAccess}>

                    <!-- ✅ Wrapper added for mobile horizontal swipe (desktop stays same) -->
                    <div class="pathScroll">
                        <div class="slds-path">
                            <div class="slds-grid slds-path__track">
                                <div class="slds-grid slds-path__scroller-container">
                                    <div class="slds-path__scroller">
                                        <div class="slds-path__scroller_inner">
                                            <ul class="slds-path__nav" role="listbox">
                                                <template for:each={steps} for:item="step">
                                                    <li key={step.key} class={step.class} role="presentation">
                                                        <a class="slds-path__link" role="option" tabindex="-1">
                                                            <span class="slds-path__stage">
                                                                <lightning-icon icon-name={step.icon}
                                                                        size="xx-small"
                                                                        alternative-text={step.label}>
                                                                </lightning-icon>
                                                            </span>
                                                            <span class="slds-path__title">{step.label}</span>
                                                        </a>
                                                    </li>
                                                </template>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                </template>

                <template if:false={hasAccess}>
                    <div class="slds-p-around_medium slds-text-color_error">
                        We couldn’t load this Lead path. The record may not be accessible on this site.
                    </div>
                </template>
            </template>

            <template if:false={isReady}>
                <div class="slds-p-around_medium">
                    <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                </div>
            </template>
        </lightning-card>
    </template>
</template>
