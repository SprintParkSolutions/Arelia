<template>
  <section class="process-root" aria-labelledby="process-title" role="region">
    <div class="wrap">
      <header class="heading">

        <!-- EYEBROW -->
        <div class="eyebrow"
          style="font-family:'Lato', sans-serif !important; font-size:17 px !important; line-height:1.4 !important;">
          OUR PROCESS
        </div>

        <!-- MAIN TITLE -->
        <h2 id="process-title" class="title"
          style="font-family:'Playfair Display', serif !important; font-size:36 px !important; line-height:1.3 !important;">
          How Our Smart Interior System Works
        </h2>

        <!-- SUBTITLE -->
        <p class="subtitle"
          style="font-family:'Lato', sans-serif !important; font-size:18px !important; line-height:1.5 !important;">
          A fully digitized workflow powered by Salesforce — from your first enquiry to project handover.
        </p>
      </header>

      <div class="grid">
        <template for:each={stepsWithIndex} for:item="s">
          <div key={s.id} class="step-card">

            <!-- BIG NUMBER -->
            <div class="big-number"
              style="font-family:'Playfair Display', serif !important; font-size:48px !important; line-height:1.05 !important;">
              {s.indexFormatted}
            </div>

            <div class="content">
              <!-- STEP TITLE -->
              <h3 class="step-title"
                style="font-family:'Playfair Display', serif !important; font-size:20px !important; line-height:1.3 !important;">
                {s.title}
              </h3>

              <!-- STEP DESCRIPTION -->
              <p class="step-desc"
                style="font-family:'Lato', sans-serif !important; font-size:16px !important; line-height:1.6 !important;">
                {s.description}
              </p>
            </div>
          </div>
        </template>
      </div>

      <div class="cta-row">
        <button class="cta"
          style="font-family:'Lato', sans-serif !important; font-size:16px !important; line-height:1.4 !important;"
          onclick={handleStart}>
          Start Your Project
        </button>
      </div>
    </div>
  </section>
</template>
