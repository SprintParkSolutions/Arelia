<template>
  <section class="consult-strip" aria-labelledby="consult-heading">
    <div class="consult-inner">
      <!-- LEFT: Image column (swapped) -->
      <div class="image-column">
        <div class="image-card" part="image-card">
          <img src={appointmentImg} alt="Interior consultation preview" class="consult-img" />
        </div>
      </div>

      <!-- RIGHT: Content column -->
      <div class="consult-right">
        <p class="eyebrow reveal">Book a Consultation</p>
        <h2 id="consult-heading" class="headline reveal">Ready to Transform Your Space?</h2>
        <p class="subtext reveal">
          Talk to our design experts and get a personalized plan for your home or workspace.
        </p>

        <div>
          <button class="cta-button reveal" type="button" onclick={handleBookClick} aria-label="Book Consultation">
            Book Consultation
          </button>
        </div>
      </div>
    </div>
  </section>

  <template if:true={showRegistrationPopup}>
    <c-registration-popup-form onclosepopup={handleClosePopup}></c-registration-popup-form>
  </template>
</template>
