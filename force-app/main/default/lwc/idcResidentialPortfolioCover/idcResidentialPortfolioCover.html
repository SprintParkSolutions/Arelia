<template>
    <section class="portfolio-cover" aria-label="Residential portfolio hero">
        <div class="image-container" data-hero>

            <video class="cover-video" src={coverVideo} autoplay muted loop playsinline preload="metadata"
                poster={posterImage} aria-hidden="true"></video>

            <div class="caption-overlay" role="region" aria-label="Hero message">

                <h1 class="hero-title" style="font-family:'Playfair Display', serif !important;">
                    Where Luxury Meets Thoughtful Living
                </h1>

                <p class="hero-sub" style="font-family:'Lato', sans-serif !important;">
                    Crafting spaces that feel timeless, warm and effortlessly refined.
                </p>

                <button class="unique-button" onclick={handleOpenPopup} aria-label="Talk to our designer"
                    style="font-family:'Lato', sans-serif !important;">
                    Talk to Our Designer
                </button>

            </div>
        </div>
    </section>

    <template if:true={showRegistrationPopup}>
        <c-registration-popup-form onclosepopup={handleClosePopup}></c-registration-popup-form>
    </template>
</template>
