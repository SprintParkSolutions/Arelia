<template>
    <section class="page">
        <div class="outer">
            <div class="pageTitle">
                <h1>Review for Arelia Living – Site Visit</h1>
                <p class="pageSub">
                    Hello, please review the site visit details shared with you. Once reviewed, kindly provide your
                    approval or request reschedule using the options below.
                </p>
            </div>

            <div class="card">
                <div class="cardHead">
                    <div class="brandIcon">
                        <lightning-icon icon-name="custom:custom63" size="small"></lightning-icon>
                    </div>
                    <div class="cardHeadText">
                        <div class="cardTitle">Submission Decision</div>
                        <div class="cardDesc">
                            This page is only for submitting your decision. Your response will be shared with our
                            supervisor team
                            and you will also receive a confirmation email.
                        </div>
                    </div>
                </div>

                <div class="note">
                    <lightning-icon icon-name="utility:info" size="x-small" class="noteIcon"></lightning-icon>
                    <div class="noteText">
                        <b>Note:</b> If you choose <b>Reschedule</b>, please select a new date and time slot and submit.
                    </div>
                </div>

                <div class="whatBox">
                    <div class="whatTitle">What you can do</div>
                    <ul class="whatList">
                        <li><b>Approve</b> — confirms the site visit at the scheduled date &amp; time.</li>
                        <li><b>Reschedule</b> — choose a new date &amp; time slot that works for you.</li>
                    </ul>
                </div>

                <div class="actions">
                    <button class="btn primary" onclick={onApproveClick} disabled={buttonsDisabled}>
                        Approve
                    </button>
                    <button class="btn secondary" onclick={onRescheduleClick} disabled={buttonsDisabled}>
                        Reschedule
                    </button>
                </div>

                <template if:true={showReschedule}>
                    <div class="panel">
                        <div class="panelTitle">Reschedule appointment</div>

                        <div class="grid">
                            <div class="field">
                                <lightning-input type="date" label="New Date" min={minDate} value={selectedDate}
                                    onchange={handleDateChange}>
                                </lightning-input>
                            </div>

                            <div class="field">
                                <lightning-combobox name="TimeSlot" label="Time Slot" value={selectedTimeSlot}
                                    placeholder="Select a time slot" options={timeSlotOptions}
                                    onchange={handleTimeSlotChange}>
                                </lightning-combobox>
                            </div>
                        </div>

                        <div class="panelActions">
                            <button class="btn primary" onclick={onRescheduleSubmitClick} disabled={buttonsDisabled}>
                                Submit
                            </button>
                            <button class="btn ghost" onclick={cancelReschedule} disabled={buttonsDisabled}>
                                Cancel
                            </button>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- CONFIRM MODAL -->
        <template if:true={showConfirm}>
            <div class="overlay" role="dialog" aria-modal="true">
                <div class="modal">
                    <div class="modalTitle">{confirmTitle}</div>
                    <div class="modalMsg">{confirmMessage}</div>

                    <div class="modalActions">
                        <button class="btn primary" onclick={confirmYes} disabled={confirmbuttonsdisabled}>
                            <template if:false={issubmitting}>
                                Yes
                            </template>
                            <template if:true={issubmitting}>
                                <span class="spinner"></span>
                                Submitting…
                            </template>
                        </button>

                        <button class="btn ghost" onclick={confirmNo} disabled={confirmbuttonsdisabled}>
                            No
                        </button>
                    </div>
                </div>
            </div>
        </template>

        <!-- THANK YOU MODAL -->
        <template if:true={showThankYou}>
            <div class="overlay" role="dialog" aria-modal="true">
                <div class="thank">
                    <div class="tick">
                        <lightning-icon icon-name="utility:success" size="small"></lightning-icon>
                    </div>

                    <div class="thankTitle">Thank you!</div>
                    <div class="thankMsg">
                        We received your response. Our supervisor team will contact you soon if anything is needed.
                        You’ll also receive an email confirmation.
                    </div>

                    <div class="modalActions">
                        <button class="btn primary" onclick={handleClose}>Close</button>
                    </div>
                </div>
            </div>
        </template>
    </section>
</template>
