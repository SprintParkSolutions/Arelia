<template>
    <lightning-card title="Vendor Abscond Email Handler" icon-name="email">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
        </template>

        <!-- Screen 1: Select Template -->
        <template if:true={isScreen1}>
            <div class="slds-p-around_medium">
                <h2 class="slds-text-heading_small slds-m-bottom_medium">Select an Email Template</h2>

                <template if:true={emailTemplates.length}>
                    <lightning-radio-group
                        name="templateSelector"
                        label="Available Email Templates"
                        options={templateOptions}
                        value={selectedTemplateId}
                        type="radio"
                        onchange={handleTemplateChange}>
                    </lightning-radio-group>
                </template>

                <template if:false={emailTemplates.length}>
                    <p>No email templates found in folder “Vendor Abscond Templates”.</p>
                </template>

                <div class="slds-m-top_large slds-align_absolute-center">
                    <lightning-button
                        variant="brand"
                        label="Next"
                        onclick={goToNextScreen}
                        disabled={isNextDisabled}>
                    </lightning-button>
                </div>
            </div>
        </template>

        <!-- Screen 2: Accordion for Vendors & Client -->
        <template if:true={isScreen2}>
            <div class="slds-p-around_medium">

                <lightning-accordion allow-multiple-sections>
                    <!-- Vendors Accordion -->
                    <lightning-accordion-section name="vendors" label="Abscond Vendors">
                        <template if:true={vendors.length}>
                            <template for:each={vendors} for:item="vendor">
                                <div key={vendor.id} class="slds-m-bottom_small">
                                    <lightning-input
                                        type="checkbox"
                                        label={vendor.name}
                                        data-id={vendor.id}
                                        data-email={vendor.email}
                                        onchange={handleRecipientSelection}>
                                    </lightning-input>
                                    <p class="slds-text-body_small slds-text-color_weak">
                                        Email: {vendor.email}
                                    </p>
                                </div>
                            </template>
                        </template>
                        <template if:false={vendors.length}>
                            <p>No abscond vendors found.</p>
                        </template>
                    </lightning-accordion-section>

                    <!-- Client Accordion -->
                    <lightning-accordion-section name="client" label="Client">
                        <template if:true={clientEmail}>
                            <lightning-input
                                type="checkbox"
                                label={clientName}
                                data-email={clientEmail}
                                onchange={handleRecipientSelection}>
                            </lightning-input>
                            <p class="slds-text-body_small slds-text-color_weak">
                                Email: {clientEmail}
                            </p>
                        </template>
                        <template if:false={clientEmail}>
                            <p>No client email found.</p>
                        </template>
                    </lightning-accordion-section>
                </lightning-accordion>

                <!-- Buttons -->
                <div class="slds-m-top_large slds-align_absolute-center">
                    <lightning-button
                        variant="neutral"
                        label="Back"
                        onclick={goToPreviousScreen}
                        class="slds-m-right_small">
                    </lightning-button>

                    <lightning-button
                        variant="brand"
                        label="Send Email"
                        onclick={handleSendEmail}
                        disabled={isSendDisabled}>
                    </lightning-button>
                </div>
            </div>
        </template>
    </lightning-card>
</template>
