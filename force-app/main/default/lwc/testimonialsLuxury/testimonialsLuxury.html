<template>
  <section class="test-root" aria-labelledby="test-title" role="region">
    <div class="wrap">

      <header class="heading">

        <!-- EYEBROW -->
        <div class="eyebrow"
             style="font-family:'Lato', sans-serif !important; font-size:17px !important; line-height:1.4 !important;">
          WHAT CLIENTS SAY
        </div>

        <!-- MAIN HEADING -->
        <h2 id="test-title"
            style="font-family:'Playfair Display', serif !important; font-size:36 px !important; line-height:1.3 !important;">
          Client Testimonials
        </h2>

        <!-- SUBTEXT -->
        <p class="sub"
           style="font-family:'Lato', sans-serif !important; font-size:18px !important; line-height:1.5 !important;">
          Our clients value the process as much as the result. Here’s what a few of them said about working with us.
        </p>

      </header>

      <div class="cards" role="list" aria-live="polite">
        <template for:each={processedTestimonials} for:item="t">
          <article key={t.id}
                   class={t._cardClass}
                   role="listitem"
                   tabindex="0"
                   onfocusin={handleFocus}
                   data-index={t.index}>

            <div class="card-accent" aria-hidden="true"></div>

            <div class="card-content">

              <!-- QUOTE -->
              <div class="quote"
                   style="font-family:'Playfair Display', serif !important; font-size:22px !important; line-height:1.5 !important;">
                “{t.quote}”
              </div>

              <div class="meta-row">

                <div class="avatar-wrap">
                  <template if:true={t.avatar}>
                    <img src={t.avatar} alt={t.name} class="avatar" />
                  </template>
                  <template if:false={t.avatar}>
                    <div class="avatar placeholder" aria-hidden="true"></div>
                  </template>
                </div>

                <div class="who">

                  <!-- NAME -->
                  <div class="name"
                       style="font-family:'Playfair Display', serif !important; font-size:18px !important; line-height:1.3 !important;">
                    {t.name}
                  </div>

                  <!-- ROLE -->
                  <div class="role"
                       style="font-family:'Lato', sans-serif !important; font-size:16px !important; line-height:1.4 !important;">
                    {t.role}
                  </div>

                </div>

              </div>
            </div>
          </article>
        </template>
      </div>

      <div class="controls" aria-hidden="false">

        <!-- LEFT ARROW -->
        <button class="ctrl"
                style="font-family:'Lato', sans-serif !important; font-size:16px !important;"
                title="Previous"
                onclick={prev}
                aria-label="Previous testimonial">
          &larr;
        </button>

        <!-- DOTS -->
        <div class="dots" role="tablist">
          <template for:each={processedTestimonials} for:item="t">
            <button key={t.id}
                    class={t._dotClass}
                    style="font-family:'Lato', sans-serif !important; font-size:14px !important;"
                    role="tab"
                    aria-selected={t._isActive}
                    data-index={t.index}
                    onclick={goTo}>
            </button>
          </template>
        </div>

        <!-- RIGHT ARROW -->
        <button class="ctrl"
                style="font-family:'Lato', sans-serif !important; font-size:16px !important;"
                title="Next"
                onclick={next}
                aria-label="Next testimonial">
          &rarr;
        </button>

      </div>

    </div>
  </section>
</template>
