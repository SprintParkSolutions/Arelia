<template>
    <lightning-quick-action-panel header="Manage Vendor Tasks">

        <div class="slds-m-bottom_medium">
            <lightning-progress-indicator current-step={currentStep} type="path" variant="base">
                <lightning-progress-step label="Start" value="start"></lightning-progress-step>
                <lightning-progress-step label="Draft Tasks" value="draft"></lightning-progress-step>
                <lightning-progress-step label="Review & Attach" value="review"></lightning-progress-step>
            </lightning-progress-indicator>
        </div>

        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </template>

        <template if:true={showLanding}>
            <div class="slds-align_absolute-center slds-text-align_center slds-p-around_medium">
                <div>
                    <lightning-icon icon-name="standard:task" size="medium"></lightning-icon>
                    <h2 class="slds-text-heading_medium slds-m-top_small">Tasks Found</h2>
                    <p class="slds-text-color_weak">Tasks have already been assigned to this Vendor.</p>
                    <div class="slds-m-top_medium">
                        <lightning-button variant="brand" label="View & Edit Tasks" onclick={goToPreview}></lightning-button>
                        <lightning-button variant="neutral" label="Create New Tasks" class="slds-m-left_small" onclick={initCreation}></lightning-button>
                    </div>
                </div>
            </div>
        </template>

        <template if:true={showCreation}>
            <div class="slds-scrollable_y" style="max-height: 400px; padding-bottom: 2rem;">
                <template for:each={taskList} for:item="task" for:index="index">
                    <div key={task.key} class="slds-box slds-m-bottom_small slds-theme_shade">
                        <div class="slds-grid slds-grid_align-spread slds-m-bottom_small">
                            <h3 class="slds-text-heading_small"><strong>Task #{task.displayIndex}</strong></h3>
                            <lightning-button-icon icon-name="utility:delete" variant="bare" alternative-text="Remove" data-index={index} onclick={removeRow} if:true={isMoreThanOneRow}></lightning-button-icon>
                        </div>
                        <lightning-layout multiple-rows>
                            <lightning-layout-item size="6" padding="horizontal-small">
                                <lightning-input label="Subject" value={task.Subject} data-index={index} data-field="Subject" onchange={handleInputChange} required></lightning-input>
                            </lightning-layout-item>
                            <lightning-layout-item size="6" padding="horizontal-small">
                                <lightning-combobox label="Status" value={task.Status} options={statusOptions} data-index={index} data-field="Status" onchange={handleInputChange} required></lightning-combobox>
                            </lightning-layout-item>
                            <lightning-layout-item size="4" padding="horizontal-small">
                                <lightning-input type="date" label="Start Date" value={task.Start_Date__c} data-index={index} data-field="Start_Date__c" onchange={handleInputChange} required></lightning-input>
                            </lightning-layout-item>
                            <lightning-layout-item size="4" padding="horizontal-small">
                                <lightning-input type="date" label="Due Date" value={task.ActivityDate} data-index={index} data-field="ActivityDate" onchange={handleInputChange} required></lightning-input>
                            </lightning-layout-item>
                            <lightning-layout-item size="4" padding="horizontal-small">
                                <lightning-input type="number" label="Assigned %" value={task.Assigned_Percentage__c} data-index={index} data-field="Assigned_Percentage__c" onchange={handleInputChange} formatter="percent-fixed" step="0.01"></lightning-input>
                            </lightning-layout-item>
                        </lightning-layout>
                    </div>
                </template>
                <lightning-button label="Add Another Task" icon-name="utility:add" variant="neutral" onclick={addNewRow} class="slds-m-top_x-small"></lightning-button>
            </div>
        </template>

        <template if:true={showPreview}>
            <div class="slds-notify slds-notify_alert slds-alert_warning slds-m-bottom_small" role="alert">
                <h2>Review Mode: Edit fields or upload files, then click <strong>"Save All Changes"</strong>.</h2>
            </div>

            <div class="slds-scrollable_y" style="max-height: 400px;">
                <template for:each={previewData} for:item="rec" for:index="index">
                    <div key={rec.Id} class="slds-box slds-m-bottom_small">
                        
                        <div class="slds-m-bottom_small slds-border_bottom slds-p-bottom_x-small">
                            <h3 class="slds-text-heading_small"><strong>Task #{rec.serialNumber}</strong></h3>
                        </div>

                        <lightning-layout multiple-rows>
                            <lightning-layout-item size="6" padding="horizontal-small">
                                <lightning-input label="Subject" value={rec.Subject} data-index={index} data-field="Subject" onchange={handlePreviewChange} required></lightning-input>
                            </lightning-layout-item>
                            <lightning-layout-item size="6" padding="horizontal-small">
                                <lightning-combobox label="Status" value={rec.Status} options={statusOptions} data-index={index} data-field="Status" onchange={handlePreviewChange} required></lightning-combobox>
                            </lightning-layout-item>
                            <lightning-layout-item size="4" padding="horizontal-small">
                                <lightning-input type="date" label="Start Date" value={rec.Start_Date__c} data-index={index} data-field="Start_Date__c" onchange={handlePreviewChange} required></lightning-input>
                            </lightning-layout-item>
                            <lightning-layout-item size="4" padding="horizontal-small">
                                <lightning-input type="date" label="Due Date" value={rec.ActivityDate} data-index={index} data-field="ActivityDate" onchange={handlePreviewChange} required></lightning-input>
                            </lightning-layout-item>
                            <lightning-layout-item size="4" padding="horizontal-small">
                                <lightning-input type="number" label="Assigned %" value={rec.Assigned_Percentage__c} data-index={index} data-field="Assigned_Percentage__c" onchange={handlePreviewChange} formatter="percent-fixed" step="0.01"></lightning-input>
                            </lightning-layout-item>
                        </lightning-layout>

                        <div class="slds-border_top slds-m-top_small slds-p-top_small">
                            <div class="slds-grid slds-grid_vertical-align-center">
                                <lightning-file-upload 
                                    label="Upload Files" 
                                    name="fileUploader"
                                    record-id={rec.Id} 
                                    onuploadfinished={handlePreviewUpload} 
                                    data-id={rec.Id}
                                    multiple> 
                                </lightning-file-upload>

                                <template if:true={rec.hasFiles}>
                                    <div class="slds-grid slds-wrap slds-m-left_small">
                                        <template for:each={rec.fileList} for:item="file">
                                            <div key={file.key} class="slds-p-around_xx-small">
                                                 <div class="slds-box slds-box_x-small slds-theme_default slds-text-align_center">
                                                     <img src={file.imageUrl} alt={file.fileName} style="height: 60px; width: auto; display:block; margin: 0 auto;" />
                                                     <div class="slds-text-body_small slds-m-top_xx-small slds-truncate" style="max-width: 80px;" title={file.fileName}>{file.fileName}</div>
                                                 </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                                
                                <template if:false={rec.hasFiles}>
                                    <div class="slds-text-body_small slds-text-color_weak slds-m-left_medium">No files attached.</div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </template>

        <div slot="footer">
            <template if:true={showCreation}>
                <lightning-button variant="brand" label="Create & Attach" onclick={handleCreateAndProceed}></lightning-button>
                <template if:true={showExistingButton}>
                    <lightning-button label="View Existing" onclick={goToPreview} class="slds-m-left_small"></lightning-button>
                </template>
            </template>
            <template if:true={showPreview}>
                <lightning-button variant="brand" label="Save All Changes" onclick={handleFinalSave}></lightning-button>
            </template>
            <lightning-button label="Cancel" onclick={closeAction} class="slds-m-left_small"></lightning-button>
        </div>
    </lightning-quick-action-panel>
</template>
