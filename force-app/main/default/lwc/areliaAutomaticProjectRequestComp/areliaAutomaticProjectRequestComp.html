<template>
    <section class="form-wrapper">
        <div class="card-shell">

            <!-- HEADER -->
            <header class="card-header">
                <div class="header-left">
                    <h1 class="card-title">Interior Project Request Type – Automation</h1>
                    <p class="card-subtitle">
                        Please verify your details and share more information about your project so that we can
                        automatically prepare a customised Project Type.
                    </p>
                </div>
            </header>

            <div class="card-body">

                <!-- STEPS -->
                <div class="steps-bar">
                    <template for:each={steps} for:item="s">
                        <div key={s.number} class={s.cls}>
                            <div class="step-dot">{s.number}</div>
                            <div class="step-name">{s.label}</div>
                        </div>
                    </template>
                </div>

                <div class="body-divider"></div>

                <!-- STEP 1 -->
                <template if:true={isStep1}>
                    <div class="section">
                        <h2 class="section-title">Customer Details</h2>
                        <p class="section-subtitle">
                            These details are stored on your Lead and used for communication.
                        </p>

                        <div class="grid-2">
                            <lightning-input label="First Name" required value={firstName} data-field="firstName"
                                onchange={handleInput} readonly></lightning-input>
                            <lightning-input label="Last Name" required value={lastName} data-field="lastName"
                                onchange={handleInput} readonly></lightning-input>
                        </div>

                        <div class="grid-2">
                            <lightning-input type="email" label="Email" required value={email} data-field="email"
                                onchange={handleInput} readonly></lightning-input>
                            <lightning-input type="tel" label="Phone" required value={phone} data-field="phone"
                                onchange={handleInput} readonly></lightning-input>
                        </div>

                        <div class="grid-2">
                            <lightning-input label="Company Name" value={company} data-field="company"
                                onchange={handleInput}></lightning-input>
                            <lightning-input label="Full Address" value={address} data-field="address"
                                onchange={handleInput}></lightning-input>
                        </div>

                        <div class="grid-2 top-gap">
                            <lightning-input type="number" label="Total Site Space (sq.ft.)" required value={siteSpace}
                                data-field="siteSpace" onchange={handleInput}></lightning-input>
                            <lightning-textarea label="Project Notes / Expectations" value={description}
                                data-field="description" onchange={handleInput}></lightning-textarea>
                        </div>
                    </div>
                </template>

                <!-- STEP 2 -->
                <template if:true={isStep2}>
                    <div class="section">
                        <h2 class="section-title">Choose Project Type</h2>
                        <p class="section-subtitle">Select the overall type of interior project you’re planning.</p>

                        <div class="card-grid">
                            <template for:each={projectTypeOptions} for:item="pt">
                                <article key={pt.value} class={pt.cardClass} data-id={pt.value}
                                    onclick={handleProjectTypeCardClick}>
                                    <h3 class="choice-title">{pt.label}</h3>
                                    <p class="choice-text">Click to use this project type.</p>
                                </article>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- STEP 3 -->
                <template if:true={isStep3}>
                    <div class="section">
                        <h2 class="section-title">Select Category</h2>
                        <p class="section-subtitle">Choose the interior category under the selected project type.</p>

                        <template if:true={categoryCards.length}>
                            <div class="card-grid">
                                <template for:each={categoryCards} for:item="cat">
                                    <article key={cat.value} class={cat.cardClass} data-id={cat.value}
                                        onclick={handleCategoryCardClick}>
                                        <h3 class="choice-title">{cat.label}</h3>
                                        <p class="choice-text">Category under the selected project type.</p>
                                    </article>
                                </template>
                            </div>
                        </template>

                        <template if:false={categoryCards.length}>
                            <p class="hint-text">No categories available for this project type.</p>
                        </template>
                    </div>
                </template>

                <!-- STEP 4 -->
                <template if:true={isStep4}>
                    <div class="section">
                        <h2 class="section-title">Select Rooms & Quantities</h2>
                        <p class="section-subtitle">Add how many of each room you want to design.</p>

                        <template if:true={roomsWithQty.length}>
                            <div class="room-list">
                                <template for:each={roomsWithQty} for:item="room">
                                    <div key={room.id} class="room-row">
                                        <div class="room-name">{room.name}</div>
                                        <div class="room-qty-controls">
                                            <button type="button" class="qty-btn" data-id={room.id}
                                                onclick={handleRoomDecrement}>−</button>
                                            <span class="qty-value">{room.quantity}</span>
                                            <button type="button" class="qty-btn" data-id={room.id}
                                                onclick={handleRoomIncrement}>+</button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <template if:false={roomsWithQty.length}>
                            <p class="hint-text">No rooms found for this category.</p>
                        </template>
                    </div>
                </template>

                <!-- STEP 5 -->
                <template if:true={isStep5}>
                    <div class="section">
                        <h2 class="section-title">Choose Plan for Each Room</h2>
                        <p class="section-subtitle">
                            Select a room on the left and choose a plan for that room (each quantity item can be
                            different).
                        </p>

                        <div class="two-column">
                            <div class="rooms-panel">
                                <h3 class="panel-title">Rooms</h3>

                                <template if:true={roomInstancesView.length}>
                                    <template for:each={roomInstancesView} for:item="r">
                                        <div key={r.instanceKey} class={r.cardClass} data-id={r.instanceKey}
                                            onclick={handleRoomSelectForPlan}>
                                            <div class="room-sel-name">{r.displayName}</div>
                                            <div class="room-sel-design">Plan: {r.planLabel}</div>
                                        </div>
                                    </template>
                                </template>

                                <template if:false={roomInstancesView.length}>
                                    <p class="hint-text">Add at least one room in the previous step.</p>
                                </template>
                            </div>

                            <div class="designs-panel">
                                <h3 class="panel-title">Plans</h3>

                                <template if:true={planOptions.length}>
                                    <div class="card-grid">
                                        <template for:each={planOptions} for:item="pl">
                                            <article key={pl.value} class={pl.cardClass} data-id={pl.value}
                                                onclick={handlePlanSelectForInstance}>
                                                <h3 class="choice-title">{pl.label}</h3>
                                                <p class="choice-text">Apply this plan to selected room.</p>
                                            </article>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- STEP 6 -->
                <template if:true={isStep6}>
                    <div class="section">
                        <h2 class="section-title">Assign Designs to Each Room</h2>
                        <p class="section-subtitle">
                            Select a room instance. Room size is optional. If not entered, we use template size for
                            calculation.
                        </p>

                        <div class="two-column">
                            <div class="rooms-panel">
                                <h3 class="panel-title">Rooms</h3>

                                <template if:true={roomInstancesView.length}>
                                    <template for:each={roomInstancesView} for:item="r">
                                        <div key={r.instanceKey} class={r.cardClass} data-id={r.instanceKey}
                                            onclick={handleRoomSelectForDesign}>
                                            <div class="room-sel-name">{r.displayName}</div>
                                            <div class="room-sel-design">
                                                Plan: {r.planLabel} • {r.selectedDesignName}
                                            </div>
                                        </div>
                                    </template>
                                </template>
                            </div>

                            <div class="designs-panel">
                                <h3 class="panel-title">Designs</h3>

                                <div class="grid-2">
                                    <lightning-input type="number" label="Room Size (sqft) - Optional"
                                        value={currentRoomSize} data-role="roomSize" onchange={handleRoomSizeChange}>
                                    </lightning-input>

                                    <lightning-input type="text" label="Rate / sqft (from design)"
                                        value={currentRatePerSqftDisplay} readonly>
                                    </lightning-input>
                                </div>

                                <div class="grid-2">
                                    <lightning-input type="text" label="Template Size (sqft) (from design)"
                                        value={currentTemplateSizeDisplay} readonly>
                                    </lightning-input>

                                    <lightning-input type="text" label="Line Amount (auto)"
                                        value={currentLineAmountDisplay} readonly>
                                    </lightning-input>
                                </div>

                                <template if:true={currentRoomDesigns.length}>
                                    <div class="design-grid">
                                        <template for:each={currentRoomDesigns} for:item="d">
                                            <article key={d.id} class={d.itemClass} data-id={d.id}
                                                onclick={handleRoomDesignPick}>
                                                <div class="design-img-wrap">
                                                    <img src={d.thumbUrl} alt={d.name} data-img={d.fullImageUrl}
                                                        data-title={d.name} onclick={openImageModal} />
                                                </div>
                                                <div class="design-info">
                                                    <div class="design-name">{d.name}</div>
                                                    <div class="design-meta">
                                                        <span class="pill">{d.designLevel}</span>
                                                        <span class="price">
                                                            Approx:
                                                            <lightning-formatted-number value={d.finalDesignPrice}
                                                                format-style="currency"></lightning-formatted-number>
                                                        </span>
                                                    </div>
                                                </div>
                                            </article>
                                        </template>
                                    </div>
                                </template>

                                <template if:false={currentRoomDesigns.length}>
                                    <p class="hint-text">Select a room on the left to see matching designs.</p>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- STEP 7 (MOBILE FRIENDLY) -->
                <template if:true={isStep7}>
                    <div class="section">
                        <div class="preview-header">
                            <div>
                                <h2 class="section-title">Design Preview</h2>
                                <p class="section-subtitle">
                                    Review all selected room designs and estimated budget before final confirmation.
                                </p>
                            </div>

                            <div class="preview-total-pill">
                                <span>Approximate Budget:</span>
                                <span class="preview-total-value">
                                    <lightning-formatted-number value={totalBudget}
                                        format-style="currency"></lightning-formatted-number>
                                </span>
                            </div>
                        </div>

                        <template if:true={selectedDesignTiles.length}>
                            <div class="preview-table-card">
                                <!-- Desktop header -->
                                <div class="preview-table-header">
                                    <span>Room</span>
                                    <span>Plan</span>
                                    <span>Your Sqft</span>
                                    <span>Template Sqft</span>
                                    <span>Rate</span>
                                    <span>Amount</span>
                                    <span>Action</span>
                                </div>

                                <div class="preview-table-body">
                                    <template for:each={selectedDesignTiles} for:item="t">
                                        <div key={t.instanceKey} class="preview-table-row">

                                            <div class="cell cell-room">
                                                <span class="m-label">Room</span>
                                                <div class="row-room-name">{t.roomName}</div>
                                                <div class="row-design-meta">{t.designName}</div>
                                            </div>

                                            <div class="cell">
                                                <span class="m-label">Plan</span>
                                                <span class="m-value">{t.planLevel}</span>
                                            </div>

                                            <div class="cell">
                                                <span class="m-label">Your Sqft</span>
                                                <span class="m-value">{t.roomSizeText}</span>
                                            </div>

                                            <div class="cell">
                                                <span class="m-label">Template Sqft</span>
                                                <span class="m-value">{t.templateSizeText}</span>
                                            </div>

                                            <div class="cell">
                                                <span class="m-label">Rate</span>
                                                <span class="m-value">{t.rateText}</span>
                                            </div>

                                            <div class="cell">
                                                <span class="m-label">Amount</span>
                                                <span class="m-value">
                                                    <lightning-formatted-number value={t.lineAmount}
                                                        format-style="currency"></lightning-formatted-number>
                                                </span>
                                            </div>

                                            <div class="cell cell-action">
                                                <span class="m-label">Action</span>
                                                <button type="button" class="preview-remove"
                                                    data-instancekey={t.instanceKey} onclick={handleRemoveSelected}>
                                                    Remove
                                                </button>
                                            </div>

                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <template if:false={selectedDesignTiles.length}>
                            <p class="hint-text">No designs selected yet. Go back one step and assign designs.</p>
                        </template>
                    </div>
                </template>

                <!-- STEP 8 (MOBILE FRIENDLY) -->
                <template if:true={isStep8}>
                    <div class="section">
                        <h2 class="section-title">Review & Confirm</h2>
                        <p class="section-subtitle">
                            Final review before we automatically update your Lead with all details.
                        </p>

                        <div class="review-top">
                            <div class="review-summary-card">
                                <div class="review-summary-title">Customer Details</div>
                                <div class="review-kv"><span>Name</span><strong>{firstName} {lastName}</strong></div>
                                <div class="review-kv"><span>Email</span><strong>{email}</strong></div>
                                <div class="review-kv"><span>Phone</span><strong>{phone}</strong></div>
                                <div class="review-kv"><span>Company</span><strong>{company}</strong></div>
                                <div class="review-kv"><span>Address</span><strong>{address}</strong></div>
                                <div class="review-kv"><span>Total Site Space</span><strong>{siteSpace} sq.ft</strong>
                                </div>
                            </div>

                            <div class="review-summary-card">
                                <div class="review-summary-title">Project Setup</div>
                                <div class="review-kv"><span>Project
                                        Type</span><strong>{selectedProjectTypeName}</strong></div>
                                <div class="review-kv"><span>Category</span><strong>{selectedCategoryName}</strong>
                                </div>
                                <div class="review-kv"><span>Project Type</span><strong>{quotationTypeLabel}</strong></div>
                                <div class="review-kv"><span>Notes</span><strong class="wrap">{description}</strong>
                                </div>
                            </div>
                        </div>

                        <div class="review-card review-wide">
                            <h3 class="review-title">Room Design Breakdown</h3>

                            <template if:true={reviewRows.length}>
                                <div class="review-table">
                                    <!-- Desktop header -->
                                    <div class="review-table-h">
                                        <span>Room & Design</span>
                                        <span>Plan</span>
                                        <span>Your Sqft</span>
                                        <span>Template Sqft</span>
                                        <span>Rate</span>
                                        <span class="right">Amount</span>
                                    </div>

                                    <template for:each={reviewRows} for:item="r">
                                        <div key={r.key} class="review-table-r">

                                            <div class="r-cell r-room">
                                                <span class="m-label">Room & Design</span>
                                                <span class="wrap">{r.room}</span>
                                            </div>

                                            <div class="r-cell">
                                                <span class="m-label">Plan</span>
                                                <span>{r.plan}</span>
                                            </div>

                                            <div class="r-cell">
                                                <span class="m-label">Your Sqft</span>
                                                <span>{r.roomSize}</span>
                                            </div>

                                            <div class="r-cell">
                                                <span class="m-label">Template Sqft</span>
                                                <span>{r.template}</span>
                                            </div>

                                            <div class="r-cell">
                                                <span class="m-label">Rate</span>
                                                <span>{r.rate}</span>
                                            </div>

                                            <div class="r-cell r-amount">
                                                <span class="m-label">Amount</span>
                                                <span class="right">
                                                    <lightning-formatted-number value={r.amount}
                                                        format-style="currency"></lightning-formatted-number>
                                                </span>
                                            </div>

                                        </div>
                                    </template>
                                </div>
                            </template>

                            <div class="review-total">
                                <span class="total-value">
                                    Approximate Budget:
                                    <lightning-formatted-number value={totalBudget}
                                        format-style="currency"></lightning-formatted-number>
                                </span>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- STEP 9 -->
                <template if:true={isStep9}>
                    <div class="section success-wrap">
                        <div class="success-hero">
                            <img class="success-hero-img" src={successImgUrl} alt="Submitted Successfully" />
                        </div>
                        <h2 class="success-title">Submitted Successfully!</h2>
                        <p class="success-subtitle">
                            Thank you! Your project request has been submitted successfully.
                            Our Arelia team will review the details and contact you shortly.
                        </p>
                    </div>
                </template>

            </div>

            <!-- FOOTER -->
            <footer class="card-footer">
                <div class="footer-left">
                    <div class="quote-pill">
                        <span>Project Type:</span>
                        <span>{quotationTypeLabel}</span>
                    </div>
                    <span class="step-info">Step {displayStep} of 9</span>
                </div>

                <div class="footer-right">
                    <template if:false={isStep9}>
                        <lightning-button variant="neutral" label="Previous" onclick={handlePrev}></lightning-button>
                        <lightning-button variant="brand" label={nextLabel} onclick={handleNext}
                            disabled={isSaving}></lightning-button>
                    </template>

                    <template if:true={isStep9}>
                        <lightning-button variant="brand" label="Close" onclick={handleClose}></lightning-button>
                    </template>
                </div>
            </footer>
        </div>

        <!-- Loader -->
        <template if:true={isInitLoading}>
            <section class="modal-backdrop">
                <lightning-spinner alternative-text="Loading project data..." size="medium"></lightning-spinner>
            </section>
        </template>

        <!-- Image modal -->
        <template if:true={isImageModalOpen}>
            <section class="modal-backdrop">
                <div class="modal">
                    <header class="modal-header">
                        <h2 class="modal-title">{modalTitle}</h2>
                        <button class="modal-close" type="button" onclick={closeImageModal}>✕</button>
                    </header>
                    <div class="modal-body">
                        <img src={modalImageUrl} alt={modalTitle} class="modal-img" />
                    </div>
                </div>
            </section>
        </template>

        <!-- Already submitted -->
        <template if:true={isAlreadySubmitted}>
            <section class="modal-backdrop">
                <div class="submitted-modal">
                    <div class="submitted-icon">!</div>
                    <h2 class="submitted-title">Project Request Submitted</h2>
                    <p class="submitted-text">{submittedMessage}</p>
                    <div class="submitted-actions">
                        <lightning-button variant="brand" label="Close"
                            onclick={handleAlreadySubmittedClose}></lightning-button>
                    </div>
                </div>
            </section>
        </template>

    </section>
</template>
